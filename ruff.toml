line-length = 79
target-version = "py310"
indent-width = 4

exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "dist",
    "build",
    "docs",
    "test",
    "tests",
]

[lint]
select = ["F", "E", "W", "C90", "I", "N", "ANN", "B", "A", "C4", "PERF", "RUF"]
ignore = ["I001", "ANN401", "B905", "PERF203", "RUF013"]
fixable = ["ALL"]
unfixable = []

[lint.mccabe]
max-complexity = 10

[lint.pycodestyle]
ignore-overlong-task-comments = true

[lint.pydocstyle]
convention = "google"

[lint.flake8-annotations]
allow-star-arg-any = true
ignore-fully-untyped = true

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
docstring-code-format = true
